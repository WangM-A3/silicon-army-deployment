# =============================================================================
# 外贸硅基军团 - Nginx配置文件
# =============================================================================
# 路径: /etc/nginx/sites-available/silicon-army
# 或: /etc/nginx/conf.d/silicon-army.conf
# =============================================================================

# 上游服务器配置
upstream silicon_army_backend {
    server 127.0.0.1:5000 fail_timeout=0;
}

# HTTP服务器（重定向到HTTPS）
server {
    listen 80;
    listen [::]:80;
    server_name silicon-army.com www.silicon-army.com;
    
    # 强制跳转HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name silicon-army.com www.silicon-army.com;
    
    # -----------------------------------------
    # SSL证书配置（Let's Encrypt自动配置）
    # -----------------------------------------
    ssl_certificate /etc/letsencrypt/live/silicon-army.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/silicon-army.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/silicon-army.com/chain.pem;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS配置（可选启用）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # SSL会话优化
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # -----------------------------------------
    # 日志配置
    # -----------------------------------------
    access_log /var/log/nginx/silicon-army_access.log;
    error_log /var/log/nginx/silicon-army_error.log;
    
    # -----------------------------------------
    # Gzip压缩
    # -----------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_disable "MSIE [1-6]\.";
    
    # -----------------------------------------
    # 安全头
    # -----------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # -----------------------------------------
    # 根目录和静态文件
    # -----------------------------------------
    root /var/www/silicon-army;
    index index.html index.htm;
    
    # 静态资源
    location /static/ {
        alias /var/www/silicon-army/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # 开启缓存控制
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # 上传文件（如有）
    location /uploads/ {
        alias /var/www/silicon-army/data/uploads/;
        expires 7d;
        internal;  # 仅内部访问
    }
    
    # -----------------------------------------
    # 反向代理配置
    # -----------------------------------------
    location / {
        # 代理到Gunicorn
        proxy_pass http://silicon_army_backend;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket支持（如需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 错误处理
        proxy_intercept_errors off;
        proxy_next_upstream error timeout invalid_header http_502 http_503;
    }
    
    # -----------------------------------------
    # API专用配置
    # -----------------------------------------
    location /api/ {
        # API请求特殊处理
        proxy_pass http://silicon_army_backend;
        
        # CORS头（如果需要跨域）
        # add_header 'Access-Control-Allow-Origin' '*' always;
        # add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        # add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        
        # 代理设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API超时（可设置更长）
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
    }
    
    # -----------------------------------------
    # 健康检查
    # -----------------------------------------
    location /health {
        proxy_pass http://silicon_army_backend;
        proxy_set_header Host $host;
        access_log off;
    }
    
    # -----------------------------------------
    # 禁止访问的文件
    # -----------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
    }
    
    location ~ /\.env {
        deny all;
    }
    
    location ~ /\.git {
        deny all;
    }
    
    # PHP等脚本禁止执行
    location ~ \.(php|py|pl|rb|sh|cgi)$ {
        deny all;
    }
    
    # -----------------------------------------
    # 错误页面
    # -----------------------------------------
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

